name: Daily GitHub Report

on:
  schedule:
    - cron: '0 9 * * *' # Runs at 09:00 UTC every day
  workflow_dispatch: # Enables the manual "Run workflow" button

permissions:
  contents: write # Required to push commits back to the repository

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensures full history is fetched for correct rebasing

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Speeds up subsequent runs

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Check if there are changes to commit
          if [[ -n "$(git status --porcelain)" ]]; then
            git add .
            git commit -m "Update profile report"
            
            # Pull remote changes (rebase) to avoid "rejected" error
            git pull --rebase origin main
            
            # Push changes
            git push origin main
          else
            echo "No changes to commit, skipping."
          fi
