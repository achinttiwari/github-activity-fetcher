name: Daily GitHub Report

on:
  schedule:
    - cron: '0 9 * * *' # Runs at 09:00 UTC every day
  workflow_dispatch: # Enables the manual "Run workflow" button

permissions:
  contents: write # Grants the workflow permission to commit and push changes

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Update profile report"
          git push
